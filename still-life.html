<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Still Life - Aatu Alatalo</title>
    <style>
        html { scroll-behavior: smooth }
        body { margin: 0; background-color: #0a0a0a; color: #ffffff; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; display: flex; flex-direction: row; overflow-x: hidden }

        /* --- Loader --- */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease }
        .spinner { width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #ff0000; border-radius: 50%; animation: spin 1s linear infinite }
        @keyframes spin { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }

        /* --- Takaisin ylös -nappi --- */
        .back-to-top { 
            position: fixed; bottom: 40px; right: 40px; display: none; 
            background: #111; color: #ffffff; border: none; 
            width: 55px; height: 55px; border-radius: 50%; 
            font-size: 18px; cursor: pointer; z-index: 1000; 
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .back-to-top svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); width: 55px; height: 55px }
        .progress-bg { fill: none; stroke: rgba(255, 255, 255, 0.1); stroke-width: 3 }
        .progress-bar { 
            fill: none; stroke: #ff0000; stroke-width: 3;
            stroke-dasharray: 157; stroke-dashoffset: 157; 
            transition: stroke-dashoffset 0.1s linear 
        }

        /* --- Sivupalkki --- */
        aside { 
            width: 200px; height: 100vh; position: fixed; left: 0; top: 0; 
            padding: 50px 25px; box-sizing: border-box; display: flex; 
            flex-direction: column; justify-content: space-between; 
            border-right: 1px solid #1a1a1a; z-index: 100; background: #0a0a0a 
        }
        .logo { font-size: 18px; text-transform: uppercase; letter-spacing: 3px; text-decoration: none; color: #ffffff; font-weight: 300; line-height: 1.3 }

        nav { display: flex; flex-direction: column; gap: 18px; margin-top: 50px }
        nav a { text-decoration: none; color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.3s ease }
        nav a:hover { color: #ff0000; transform: translateX(6px) }

        .ig-link { color: #ffffff; opacity: 0.7; transition: all 0.3s ease }
        .ig-link:hover { color: #ff0000; opacity: 1 }

        /* --- Pääsisältö --- */
        main { margin-left: 200px; width: calc(100% - 200px); min-height: 100vh }
        .content-wrapper { max-width: 750px; margin: 0 auto; padding: 50px }

        /* --- Kuvat --- */
        .image-section { 
            margin-bottom: 120px; opacity: 0; transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease 
        }
        .image-section.is-visible { opacity: 1; transform: translateY(0) }

        .gallery-img { width: 100%; height: auto; border-radius: 2px; cursor: zoom-in; transition: transform 0.5s ease }
        .gallery-img:hover { transform: scale(1.01) }

        .project-info { margin-top: 20px; font-size: 11px; letter-spacing: 2px; color: #ffffff; text-transform: uppercase; font-weight: 300 }
        .project-info p:last-child { color: #888; font-size: 10px; margin-top: 4px }

        /* --- Lightbox --- */
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); cursor: zoom-out }
        .lightbox.active { display: flex }
        .lightbox-img { max-width: 90%; max-height: 85vh; object-fit: contain }

        /* --- Footer --- */
        .contact-section { padding: 100px 50px; background: #000; border-top: 1px solid #141414 }
        .contact-title { font-size: 28px; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 50px; font-weight: 300 }

        @media (max-width: 1024px) {
            aside { width: 100%; height: auto; position: relative; border-right: none; padding: 30px }
            main { margin-left: 0; width: 100% }
            body { flex-direction: column }
            nav { flex-direction: row; gap: 20px }
        }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<button id="backToTop" class="back-to-top">
    <svg viewBox="0 0 60 60">
        <circle class="progress-bg" cx="30" cy="30" r="25"></circle>
        <circle id="progressBar" class="progress-bar" cx="30" cy="30" r="25"></circle>
    </svg>
    <span>↑</span>
</button>

<aside>
    <div>
        <a href="index.html" class="logo">Aatu<br>Alatalo</a>
        <nav>
            <a href="about.html">About</a>
            <a href="index.html">Series</a>
            <a href="#contact">Contact</a>
        </nav>
    </div>
    <a href="https://www.instagram.com/teeaatu/" target="_blank" class="ig-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
    </a>
</aside>

<main>
    <div class="content-wrapper">
        <section class="image-section">
            <img src="DSC4115-1.jpg" alt="Lähikuva puolitetusta lohikäärmehedelmästä puisella leikkuulaudalla. Käsi ottaa lusikalla hedelmälihaa kukkakuvioisen pöytäliinan päällä." class="gallery-img">
            <div class="project-info">
                <p>Pitaya</p>
                <p>2025</p>
            </div>
        </section>

        <section class="image-section">
            <img src="paprika.jpg" alt="Lähikuva pystyyn asetetusta halkaistusta punaisesta paprikasta, jonka siemenkota on esillä. Vieressä on pieni omenanlohko ja taustalla näkyy osa kannettavaa tietokonetta vihreällä alustalla." class="gallery-img">
            <div class="project-info">
                <p>PAPRIKA</p>
                <p>2025</p>
            </div>
        </section>
    </div>

    <footer class="contact-section" id="contact">
        <div class="contact-title">Contact</div>
        <div class="contact-info">
            <p>Aatu Alatalo</p>
            <p><a href="mailto:aatuelias.alatalo@gmail.com" style="color: #ff0000; text-decoration: none;">aatuelias.alatalo@gmail.com</a></p>
            <p>Oulu, Finland</p>
            <p style="margin-top: 50px; font-size: 10px; color: #222">COPYRIGHT 2026 AATU ALATALO</p>
        </div>
    </footer>
</main>

<div class="lightbox" id="lightbox"><img src="" class="lightbox-img" id="lightbox-img"></div>

<script>
    // Latausanimaatio
    window.addEventListener('load', () => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => { document.getElementById('loader').style.display = 'none' }, 500);
    });

    // Edistymispalkki ja rullaus
    const backToTopBtn = document.getElementById('backToTop');
    const progressBar = document.getElementById('progressBar');
    const circumference = 157;

    window.addEventListener('scroll', () => {
        const scrollTotal = document.documentElement.scrollHeight - window.innerHeight;
        const scrollPosition = window.pageYOffset;
        backToTopBtn.style.display = scrollPosition > 300 ? 'flex' : 'none';
        const offset = circumference - (Math.min(scrollPosition / scrollTotal, 1) * circumference);
        progressBar.style.strokeDashoffset = offset;
    });

    backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // Kuvien ilmestyminen rullattaessa
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if(entry.isIntersecting) {
                entry.target.classList.add('is-visible');
            }
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.image-section').forEach(section => observer.observe(section));

    // Lightbox
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    document.querySelectorAll(".gallery-img").forEach(img => {
        img.addEventListener("click", () => {
            lightboxImg.src = img.src;
            lightbox.classList.add("active");
        });
    });
    lightbox.addEventListener("click", () => lightbox.classList.remove("active"));
</script>
</body>
</html>
