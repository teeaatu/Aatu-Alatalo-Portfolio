<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>404 / The Void</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    body {
      margin: 0; padding: 0; background-color: #0a0a0a; color: #ffffff;
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; overflow: hidden;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    h1 {
      font-size: clamp(60px, 10vw, 120px); font-weight: 200;
      letter-spacing: 0.05em; margin: 0; line-height: 1;
    }
    .error-text {
      font-size: 14px; color: #666; font-weight: 300;
      letter-spacing: 0.1em; margin-top: 15px; margin-bottom: 0;
    }
    a {
      margin-top: 40px; font-size: 13px; letter-spacing: 0.15em;
      color: #888; text-decoration: none; text-transform: uppercase;
      transition: color 0.3s ease;
    }
    a:hover { color: #fff; }
  </style>
</head>
<body>
  <h1>404</h1>
  <p class="error-text">Sivun lataus epäonnistui.</p>
  <a href="/">Takaisin yleisnäkymään</a>
</body>
</html>
