<!DOCTYPE html>
{% assign lang = page.lang | default: 'fi' %}
<html lang="{{ lang }}">
<head>
  {% include head.html %}
  {% seo %}
</head>
<body id="body" class="{% if page.active_nav == 'index' %}index-page{% endif %}">

{% include cookie-banner.html %}

{% include mobile-header.html %}

{% include sidebar.html %}

<main>
  {{ content }}

  {% include page_nav.html %}

  {% include footer.html %}
</main>

{% include back-to-top.html %}

<script>
  // Evästebannerin logiikka
  document.addEventListener("DOMContentLoaded", function() {
    const banner = document.getElementById('cookie-banner');
    const acceptBtn = document.getElementById('accept-cookies');
    const declineBtn = document.getElementById('decline-cookies');
    
    const cookieChoice = localStorage.getItem('cookieChoice');
    
    if (cookieChoice === 'accepted') {
      gtag('consent', 'update', {
        'analytics_storage': 'granted'
      });
    }
    
    // Funktio evästebannerin näyttämiseen, jota voidaan kutsua muualta
    window.showCookieBanner = function() {
      if (!localStorage.getItem('cookieChoice')) {
        banner.style.display = 'block';
      }
    };
    
    if(acceptBtn) {
        acceptBtn.addEventListener('click', function() {
          localStorage.setItem('cookieChoice', 'accepted');
          gtag('consent', 'update', {
            'analytics_storage': 'granted'
          });
          banner.style.display = 'none';
        });
    }

    if(declineBtn) {
        declineBtn.addEventListener('click', function() {
          localStorage.setItem('cookieChoice', 'declined');
          banner.style.display = 'none';
        });
    }
  });

  // Hampurilaisvalikko
  const menuToggle = document.getElementById('menuToggle');
  const body = document.getElementById('body');
  if(menuToggle) {
      menuToggle.addEventListener('click', () => {
          body.classList.toggle('menu-open');
      });
  }

  // --- MOBILE MENU VIEW TRANSITION FIX (Micro-close) ---
  // Ensures the menu closes fully before the browser takes a View Transition snapshot
  document.querySelectorAll('aside a, .mobile-header a').forEach(link => {
    link.addEventListener('click', function(e) {
      // Only intercept if the mobile menu is actively open
      if (body.classList.contains('menu-open')) {
        // Allow standard browser behavior for modified clicks (e.g. open in new tab)
        if (e.ctrlKey || e.metaKey || e.shiftKey || e.altKey) return;
        
        const href = this.getAttribute('href');
        
        // Ignore edge cases (external links, mailto, etc.). Just close the menu for hash links.
        if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:') || this.getAttribute('target') === '_blank') {
          if (href && href.startsWith('#')) body.classList.remove('menu-open');
          return;
        }

        const isLocal = this.hostname === window.location.hostname || !this.hostname;
        if (isLocal) {
          e.preventDefault();
          // Navigate instantly. The View Transition API will naturally fade the open menu into the new closed page.
          window.location.href = href;
        }
      }
    });
  });

  // iOS Safari BFCache safeguard: ensure menu is fully reset on swipe-back
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) body.classList.remove('menu-open');
  });

  // Skrollaus kontaktiin
  const contactBtn = document.getElementById('contactBtn');
  if(contactBtn) {
      contactBtn.addEventListener('click', (e) => {
        e.preventDefault();
        const contactSection = document.getElementById('contact');
        if(contactSection) {
            contactSection.scrollIntoView({ behavior: 'smooth' });
            body.classList.remove('menu-open');
        }
      });
  }

      // --- PHOTOSWIPE V5 LATAUKSEN HALLINTA & KLIKKAUKSEN SIEPPAUS ---
      let isPhotoSwipeReady = false;
      let bufferedLink = null;

      // Estetään valkoinen välähdys: siepataan klikkaus synkronisesti ennen kuin PhotoSwipe on ehtinyt latautua
      document.addEventListener('click', (e) => {
          const link = e.target.closest('a.gallery-link-wrapper');
          if (link && !isPhotoSwipeReady) {
              e.preventDefault(); // Estää selaimesi avaamasta "raakaa" kuvatiedostoa koko ruudulle
              bufferedLink = link; // Puskuroidaan klikkaus odottamaan moduulia
          }
      });

  // PhotoSwipe v5 Lightbox logic
  import('https://unpkg.com/photoswipe@5.4.3/dist/photoswipe-lightbox.esm.js').then((module) => {
    const PhotoSwipeLightbox = module.default;
    const lightbox = new PhotoSwipeLightbox({
      gallery: 'main',
      children: 'a.gallery-link-wrapper',
      pswpModule: () => import('https://unpkg.com/photoswipe@5.4.3/dist/photoswipe.esm.js'),
      bgOpacity: 1, // Asetetaan 1, jotta blur ei katoa. Taustan tummuus hoidetaan CSS:llä!
      paddingFn: (viewportSize) => {
        // Reunus: mobiilissa 20px ja työpöydällä 60px, jotta kuva ei osu reunoihin
        const p = window.innerWidth < 768 ? 20 : 60;
        return { top: p, bottom: p, left: p, right: p };
      },
      spacing: 0.15, // Lisää hieman "ilmaa" kuvien väliin, kun niitä pyyhkäisee/vaihtaa
      imageClickAction: 'next', // Kuvaa klikkaamalla se liukuu nyt pehmeästi seuraavaan
      tapAction: 'next', // Mobiilissa sormella täppääminen vaihtaa myös seuraavaan kuvaan
      showHideAnimationType: 'zoom',
      zoomAnimationDuration: 500, // Hieman rauhallisempi avaus ja sulkeminen
      counter: false, // minimalist UI
      zoom: false,
      maxSpreadZoom: 1, // Estää zoomaamisen alkuperäistä isommaksi
      secondaryZoomLevel: 1, // Estää tuplaklikkauksen syväzoomaamisen
      preload: [1, 2], // Lataa 1 edellisen ja 2 seuraavaa isoa kuvaa salaa taustalla valmiiksi!
    });

    lightbox.addFilter('itemData', (itemData, index) => {
      const aTag = itemData.element;
      if (aTag) {
        const img = aTag.querySelector('img');
        if (img) {
          itemData.src = aTag.href; // Haetaan ison kuvan URL suoraan ankkuritagin href:stä
          
          // Luetaan todellinen kuvasuhde juuri siitä pikkukuvasta, joka on ladattu ruudulle
          const aspect = (img.naturalWidth && img.naturalHeight) ? (img.naturalHeight / img.naturalWidth) : 1;
          
          // Virtuaaliset maksimimitat, jotta kuvasuhde on matemaattisen tarkka avattaessa
          itemData.w = 2560;
          itemData.h = 2560 * aspect;
          
          // Siepataan juuri se kuva (mobile tai desktop webp), jonka selain valitsi srcsetistä
          itemData.msrc = img.currentSrc || img.src;
        }
      }
      return itemData;
    });

    lightbox.init();
    isPhotoSwipeReady = true;

    // Jos käyttäjä ehti klikata kuvaa latauksen aikana, avataan se nyt saumattomasti
    if (bufferedLink) {
        bufferedLink.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
        bufferedLink = null;
    }
  });

  // Back to top logiikka
  const backToTopBtn = document.getElementById('backToTop');
  const progressBar = document.getElementById('progressBar');
  const circumference = 157;

  window.addEventListener('scroll', () => {
      const scrollTotal = document.documentElement.scrollHeight - window.innerHeight;
      const scrollPosition = window.pageYOffset;
      if (backToTopBtn) {
          // Ei näytetä back-to-top -nappia etusivun sliderissa
          if (document.body.classList.contains('index-page')) {
            backToTopBtn.style.display = 'none';
          } else {
            backToTopBtn.style.display = scrollPosition > 300 ? 'flex' : 'none';
          }
          const scrollPercentage = scrollTotal > 0 ? scrollPosition / scrollTotal : 0;
          const offset = circumference - (scrollPercentage * circumference);
          if (progressBar) progressBar.style.strokeDashoffset = offset;
      }
  });

  if (backToTopBtn) {
      backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  }

  // --- MASONRY GRID LOGIIKKA ---
  document.addEventListener('DOMContentLoaded', () => {
      const grid = document.querySelector('.overview-grid');
      if (!grid) return;

      // Aktivoidaan Masonry CSS-luokka
      grid.classList.add('js-masonry-active');

      function layoutMasonry() {
          const items = Array.from(grid.querySelectorAll('.overview-item'));
          if (items.length === 0) return;

          const isMobile = window.innerWidth <= 1024;
          const gap = isMobile ? 15 : 40;
          const cols = isMobile ? 2 : 3;
          
          const gridWidth = grid.getBoundingClientRect().width;
          const colWidth = (gridWidth - gap * (cols - 1)) / cols;

          let colHeights = new Array(cols).fill(0);

          items.forEach((item, index) => {
              item.style.width = colWidth + 'px';
              
              let targetCol;
              if (index < cols) {
                  targetCol = index; // Pakottaa ylärivin kuvat järjestykseen (priority)
              } else {
                  targetCol = colHeights.indexOf(Math.min(...colHeights)); // Loput lyhyimpään sarakkeeseen
              }

              const x = targetCol * (colWidth + gap);
              const y = colHeights[targetCol];

              item.style.left = x + 'px';
              item.style.top = y + 'px';
              
              colHeights[targetCol] += item.offsetHeight + gap;
          });

          grid.style.height = Math.max(...colHeights) + 'px';
          
          if (!grid.classList.contains('is-loaded')) {
              setTimeout(() => {
                  grid.classList.add('is-loaded');
              }, 50);
          }
      }

      let resizeTimer;
      window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(layoutMasonry, 100); });

          // Yhden kerran latausmekanismi - Estää asettelun hyppimisen ja visuaaliset välähdykset
          const images = Array.from(grid.querySelectorAll('img'));
          if (images.length === 0) {
              layoutMasonry();
          } else {
              let loadedCount = 0;
              const checkAllLoaded = () => {
                  loadedCount++;
                  if (loadedCount === images.length) {
                      layoutMasonry();
                  }
              };

              images.forEach(img => {
                  if (img.complete) {
                      checkAllLoaded();
                  } else {
                      img.addEventListener('load', checkAllLoaded);
                      img.addEventListener('error', checkAllLoaded); // Estää skriptin jäätymisen rikkinäisen kuvan takia
                  }
              });
          }
  });

  // Staggered Load Animation
  document.addEventListener('DOMContentLoaded', () => {
    // Initialize Intersection Observer for scroll animations
    const observer = new IntersectionObserver((entries) => {
        let delay = 0;
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                setTimeout(() => { entry.target.classList.add('is-visible'); }, delay);
                delay += 150;
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });
    
    // Apply animation only to items below the fold to protect initial LCP paint
    document.querySelectorAll('.image-section, .overview-item').forEach(item => {
        if (item.getBoundingClientRect().top > window.innerHeight) {
            item.classList.add('stagger-item');
            observer.observe(item);
        }
    });
  });

  // --- LAZY LOAD SMOOTH FADE-IN ---
  document.addEventListener('DOMContentLoaded', () => {
      const lazyImages = document.querySelectorAll('img[loading="lazy"]');
      lazyImages.forEach(img => {
          if (!img.complete) {
              img.classList.add('js-lazy-hidden');
              img.addEventListener('load', () => {
                  img.classList.remove('js-lazy-hidden');
                  img.classList.add('js-lazy-fade-in');
              });
              img.addEventListener('error', () => {
                  img.classList.remove('js-lazy-hidden'); // Varmistetaan ettei rikkoutunut kuva jää ikuisesti piiloon
              });
          }
      });
  });

  // --- KUVAN NIMI HOVERILLA (TOOLTIP) ---
  document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.gallery-img').forEach(img => {
          const info = img.nextElementSibling;
          if (info && info.classList.contains('project-info')) {
              const titleP = info.querySelector('p');
              if (titleP && titleP.innerText) {
                  img.setAttribute('title', titleP.innerText);
              }
          }
      });
  });

  // Mobile Smart Sticky Header Logic
  const mobileHeader = document.getElementById('mobileHeader');
  if (mobileHeader) {
    let lastScrollTop = 0;
    window.addEventListener('scroll', () => {
      const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      
      if (scrollTop > 0) {
        mobileHeader.classList.add('is-scrolled');
      } else {
        mobileHeader.classList.remove('is-scrolled');
      }
      
      if (scrollTop > lastScrollTop && scrollTop > 50) {
        mobileHeader.classList.add('header--hidden');
      } 
      else if (scrollTop < lastScrollTop) {
        mobileHeader.classList.remove('header--hidden');
      }
      
      lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
    }, { passive: true });
  }

  // --- PEHMEÄ SIVUNVAIHTO (GLOBAL FADE OUT) ---
  document.addEventListener('click', function(e) {
    const link = e.target.closest('a');
    if (!link) return;
    
    const href = link.getAttribute('href');
    
    // Ohitetaan ankkurit, ulkoiset linkit ja lightbox-toiminnot
    if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:') || link.getAttribute('target') === '_blank' || link.classList.contains('gallery-link-wrapper')) {
        return;
    }

    const isLocal = link.hostname === window.location.hostname || !link.hostname;
    if (isLocal && !e.ctrlKey && !e.metaKey && !e.shiftKey && !e.altKey) {
        e.preventDefault();
        const main = document.querySelector('main');
        if (main) {
            main.style.transition = 'opacity 0.4s ease-in-out';
            main.style.opacity = '0';
        }
        setTimeout(() => { window.location.href = href; }, 400);
    }
  });
</script>
</body>

</html>
