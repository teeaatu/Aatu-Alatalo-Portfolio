<!DOCTYPE html>
{% assign lang = page.lang | default: 'fi' %}
<html lang="{{ lang }}">
<head>
  {% include head.html %}
</head>
<body id="body" class="{% if page.active_nav == 'index' %}index-page{% endif %}">

<script>
  if (sessionStorage.getItem('introSeen') === 'true') {
    document.documentElement.classList.add('skip-intro');
  }
</script>

<div class="page-transition-overlay is-active" id="pageTransitionOverlay"></div>

{% include loader.html %}

{% include cookie-banner.html %}

{% include mobile-header.html %}

{% include sidebar.html %}

<main>
  {{ content }}

  {% include page_nav.html %}

  {% include footer.html %}
</main>

{% include back-to-top.html %}

<script>
  // Evästebannerin logiikka
  document.addEventListener("DOMContentLoaded", function() {
    const banner = document.getElementById('cookie-banner');
    const acceptBtn = document.getElementById('accept-cookies');
    const declineBtn = document.getElementById('decline-cookies');
    
    const cookieChoice = localStorage.getItem('cookieChoice');
    
    if (cookieChoice === 'accepted') {
      gtag('consent', 'update', {
        'analytics_storage': 'granted'
      });
    }
    
    // Funktio evästebannerin näyttämiseen, jota voidaan kutsua muualta
    window.showCookieBanner = function() {
      if (!localStorage.getItem('cookieChoice')) {
        banner.style.display = 'block';
      }
    };
    
    if(acceptBtn) {
        acceptBtn.addEventListener('click', function() {
          localStorage.setItem('cookieChoice', 'accepted');
          gtag('consent', 'update', {
            'analytics_storage': 'granted'
          });
          banner.style.display = 'none';
        });
    }

    if(declineBtn) {
        declineBtn.addEventListener('click', function() {
          localStorage.setItem('cookieChoice', 'declined');
          banner.style.display = 'none';
        });
    }
  });

  // Hampurilaisvalikko
  const menuToggle = document.getElementById('menuToggle');
  const body = document.getElementById('body');
  if(menuToggle) {
      menuToggle.addEventListener('click', () => {
          body.classList.toggle('menu-open');
          if (!body.classList.contains('menu-open')) {
              setTimeout(() => {
                  if(window.showCookieBanner) window.showCookieBanner();
              }, 2000);
          }
      });
  }

  // Skrollaus kontaktiin
  const contactBtn = document.getElementById('contactBtn');
  if(contactBtn) {
      contactBtn.addEventListener('click', (e) => {
        e.preventDefault();
        const contactSection = document.getElementById('contact');
        if(contactSection) {
            contactSection.scrollIntoView({ behavior: 'smooth' });
            body.classList.remove('menu-open');
            setTimeout(() => {
                if(window.showCookieBanner) window.showCookieBanner();
            }, 2000);
        }
      });
  }

  // --- LATAUSRUUTU JA MOBIILIMENU-AUTOMAATIO ---
  const loader = document.getElementById('loader');
  
  // Funktio, joka avaa valikon 3 sekunniksi
  function runMobileMenuSequence() {
    if (document.body.classList.contains('index-page') && window.innerWidth <= 1024) {
      // 1. Laitetaan menu auki heti taustalla
      document.body.classList.add('menu-open');
      const sidebar = document.getElementById('sidebar');
      if (sidebar) sidebar.classList.add('trigger-wave');

      // 2. Poistetaan latausruutu pehmeästi (menu on jo valmiiksi auki sen alla)
      if(loader) {
         loader.style.opacity = '0';
         setTimeout(() => {
           loader.style.display = 'none';
         }, 1200); // Odotetaan 1.2s CSS transitionin verran
      }

      let autoCloseTimeout;

      // Keskeytä automaattinen sulkeminen, jos käyttäjä on vuorovaikutuksessa
      const interruptHandler = () => {
        if (autoCloseTimeout) {
          clearTimeout(autoCloseTimeout);
          autoCloseTimeout = null;
          // Varmistetaan, että pääsisältö on näkyvissä
          document.body.classList.remove('hide-main-temp');
          
          window.removeEventListener('touchstart', interruptHandler);
          window.removeEventListener('mousedown', interruptHandler);
          window.removeEventListener('scroll', interruptHandler);
        }
      };

      window.addEventListener('touchstart', interruptHandler, { passive: true });
      window.addEventListener('mousedown', interruptHandler, { passive: true });
      window.addEventListener('scroll', interruptHandler, { passive: true });

      // 3. Odotetaan 3 sekuntia (menu on auki ja aaltoilee)
      autoCloseTimeout = setTimeout(() => {
        autoCloseTimeout = null;
        
        // Poistetaan kuuntelijat, jos normaalisti suoritetaan
        window.removeEventListener('touchstart', interruptHandler);
        window.removeEventListener('mousedown', interruptHandler);
        window.removeEventListener('scroll', interruptHandler);

        // 4. Palautetaan etusivun sisältö näkyviin
        document.body.classList.remove('hide-main-temp');
        
        // 5. Suljetaan menu ja poistetaan aalto-luokka
        document.body.classList.remove('menu-open');
        if (sidebar) sidebar.classList.remove('trigger-wave');
        
        // 6. Näytetään evästebanneri 2 sekuntia valikon sulkeutumisen jälkeen
        setTimeout(() => {
          if(window.showCookieBanner) window.showCookieBanner();
        }, 16000);
      }, 3000); // 3 sekuntia auki
    } else {
       // Ei mobiilin etusivu: normaali latausruudun poisto
       if(loader) {
           loader.style.opacity = '0';
           setTimeout(() => {
             loader.style.display = 'none';
           }, 1200); // Odotetaan 1.2s CSS transitionin verran
       }
       // Näytetään banneri viiveellä normaalisti
       setTimeout(() => {
          if(window.showCookieBanner) window.showCookieBanner();
       }, 2000);
    }
  }

  if (sessionStorage.getItem('introSeen') === 'true') {
    // Latausruutu on jo piilotettu .skip-intro luokan avulla
    // Näytetään banneri heti (tai pienellä viiveellä) jos sivu on jo käyty
    setTimeout(() => {
        if(window.showCookieBanner) window.showCookieBanner();
    }, 1000);
    // Ei avata valikkoa enää automaattisesti myöhemmillä sivunlatauksilla
  } else {
    // ENSIMMÄINEN KÄYNTI
    sessionStorage.setItem('introSeen', 'true');
    
    // Piilotetaan etusivun sisältö heti alussa, jos ollaan mobiilissa etusivulla
    if (document.body.classList.contains('index-page') && window.innerWidth <= 1024) {
      document.body.classList.add('hide-main-temp');
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
         // Kutsutaan sekvenssiä, joka avaa valikon latausruudun *alle* ja paljastaa sen
         runMobileMenuSequence();
      }, 2200); // Odotetaan 2.2s jotta animaatio näkyy täysin ennen feidauksen alkamista
    });
  }

  // PhotoSwipe v5 Lightbox logic
  import('https://unpkg.com/photoswipe@5.4.3/dist/photoswipe-lightbox.esm.js').then((module) => {
    const PhotoSwipeLightbox = module.default;
    const lightbox = new PhotoSwipeLightbox({
      gallery: 'main',
      children: '.gallery-img',
      pswpModule: () => import('https://unpkg.com/photoswipe@5.4.3/dist/photoswipe.esm.js'),
      bgOpacity: 0.95,
      showHideAnimationType: 'zoom',
      zoomAnimationDuration: 400,
      counter: false, // minimalist UI
      zoom: false,    // rely on pinch/double-click
    });

    lightbox.addFilter('itemData', (itemData, index) => {
      const img = itemData.element;
      if (img) {
        itemData.src = img.src;
        itemData.w = img.naturalWidth || img.clientWidth || 1920;
        itemData.h = img.naturalHeight || img.clientHeight || 1080;
        itemData.msrc = img.src;
      }
      return itemData;
    });

    lightbox.init();
  });

  // Back to top logiikka
  const backToTopBtn = document.getElementById('backToTop');
  const progressBar = document.getElementById('progressBar');
  const circumference = 157;

  window.addEventListener('scroll', () => {
      const scrollTotal = document.documentElement.scrollHeight - window.innerHeight;
      const scrollPosition = window.pageYOffset;
      if (backToTopBtn) {
          // Ei näytetä back-to-top -nappia etusivun sliderissa
          if (document.body.classList.contains('index-page')) {
            backToTopBtn.style.display = 'none';
          } else {
            backToTopBtn.style.display = scrollPosition > 300 ? 'flex' : 'none';
          }
          const scrollPercentage = scrollTotal > 0 ? scrollPosition / scrollTotal : 0;
          const offset = circumference - (scrollPercentage * circumference);
          if (progressBar) progressBar.style.strokeDashoffset = offset;
      }
  });

  if (backToTopBtn) {
      backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  }

  // Grid Shuffle & Staggered Load Animation
  document.addEventListener('DOMContentLoaded', () => {
    // Shuffle grid items on the homepage
    const grid = document.querySelector('.overview-grid.randomize-on-load');
    if (grid) {
        const items = Array.from(grid.children);
        for (let i = items.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [items[i], items[j]] = [items[j], items[i]];
        }
        const fragment = document.createDocumentFragment();
        items.forEach(item => fragment.appendChild(item));
        grid.innerHTML = '';
        grid.appendChild(fragment);
        grid.classList.add('is-shuffled');
    }

    // Initialize Intersection Observer for animations AFTER shuffling
    const observer = new IntersectionObserver((entries) => {
        let delay = 0;
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                setTimeout(() => { entry.target.classList.add('is-visible'); }, delay);
                delay += 150;
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.image-section, .overview-item').forEach(item => {
        item.classList.add('stagger-item');
        observer.observe(item);
    });
  });

  // Mobile Smart Sticky Header Logic
  const mobileHeader = document.getElementById('mobileHeader');
  if (mobileHeader) {
    let lastScrollTop = 0;
    window.addEventListener('scroll', () => {
      const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      
      if (scrollTop > 0) {
        mobileHeader.classList.add('is-scrolled');
      } else {
        mobileHeader.classList.remove('is-scrolled');
      }
      
      if (scrollTop > lastScrollTop && scrollTop > 50) {
        mobileHeader.classList.add('header--hidden');
      } 
      else if (scrollTop < lastScrollTop) {
        mobileHeader.classList.remove('header--hidden');
      }
      
      lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
    }, { passive: true });
  }

  // --- CROSS-BROWSER PAGE TRANSITION ---
  const transitionOverlay = document.getElementById('pageTransitionOverlay');
  if (transitionOverlay) {
    window.addEventListener('pageshow', (e) => {
      // Small delay to ensure render
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          transitionOverlay.classList.add('is-leaving');
          transitionOverlay.classList.remove('is-active');
          setTimeout(() => {
            transitionOverlay.classList.remove('is-leaving');
          }, 400);
        });
      });
    });

    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', function(e) {
        if (e.ctrlKey || e.metaKey || e.shiftKey || e.altKey) return;
        
        const href = this.getAttribute('href');
        // Exclude anchors, mailto, tel, target_blank and data-fancybox/photoswipe elements
        if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:') || this.getAttribute('target') === '_blank' || this.classList.contains('gallery-img')) {
          return;
        }

        const isLocal = this.hostname === window.location.hostname;
        if (isLocal) {
          e.preventDefault();
          transitionOverlay.classList.add('is-entering');
          setTimeout(() => {
            window.location.href = href;
          }, 200); // Navigate slightly before animation finishes for smoother feel
        }
      });
    });
  }
</script>
</body>

</html>
