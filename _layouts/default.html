<!DOCTYPE html>
{% assign lang = page.lang | default: 'fi' %}
<html lang="{{ lang }}">
<head>
  {% include head.html %}
  {% seo %}
</head>
<body id="body" class="{% if page.active_nav == 'index' %}index-page{% endif %}">

{% include cookie-banner.html %}

{% include mobile-header.html %}

{% include sidebar.html %}

<main>
  {{ content }}

  {% include page_nav.html %}

  {% include footer.html %}
</main>

{% include back-to-top.html %}

<script>
  // Evästebannerin logiikka
  document.addEventListener("DOMContentLoaded", function() {
    const banner = document.getElementById('cookie-banner');
    const acceptBtn = document.getElementById('accept-cookies');
    const declineBtn = document.getElementById('decline-cookies');
    
    const cookieChoice = localStorage.getItem('cookieChoice');
    
    if (cookieChoice === 'accepted') {
      gtag('consent', 'update', {
        'analytics_storage': 'granted'
      });
    }
    
    // Funktio evästebannerin näyttämiseen, jota voidaan kutsua muualta
    window.showCookieBanner = function() {
      if (!localStorage.getItem('cookieChoice')) {
        banner.style.display = 'block';
      }
    };
    
    if(acceptBtn) {
        acceptBtn.addEventListener('click', function() {
          localStorage.setItem('cookieChoice', 'accepted');
          gtag('consent', 'update', {
            'analytics_storage': 'granted'
          });
          banner.style.display = 'none';
        });
    }

    if(declineBtn) {
        declineBtn.addEventListener('click', function() {
          localStorage.setItem('cookieChoice', 'declined');
          banner.style.display = 'none';
        });
    }
  });

  // Hampurilaisvalikko
  const menuToggle = document.getElementById('menuToggle');
  const body = document.getElementById('body');
  if(menuToggle) {
      menuToggle.addEventListener('click', () => {
          body.classList.toggle('menu-open');
      });
  }

  // Skrollaus kontaktiin
  const contactBtn = document.getElementById('contactBtn');
  if(contactBtn) {
      contactBtn.addEventListener('click', (e) => {
        e.preventDefault();
        const contactSection = document.getElementById('contact');
        if(contactSection) {
            contactSection.scrollIntoView({ behavior: 'smooth' });
            body.classList.remove('menu-open');
        }
      });
  }

  // PhotoSwipe v5 Lightbox logic
  import('https://unpkg.com/photoswipe@5.4.3/dist/photoswipe-lightbox.esm.js').then((module) => {
    const PhotoSwipeLightbox = module.default;
    const lightbox = new PhotoSwipeLightbox({
      gallery: 'main',
      children: '.gallery-img',
      pswpModule: () => import('https://unpkg.com/photoswipe@5.4.3/dist/photoswipe.esm.js'),
      bgOpacity: 0.95,
      showHideAnimationType: 'zoom',
      zoomAnimationDuration: 400,
      counter: false, // minimalist UI
      zoom: false,    // rely on pinch/double-click
    });

    lightbox.addFilter('itemData', (itemData, index) => {
      const img = itemData.element;
      if (img) {
        itemData.src = img.src;
        itemData.w = img.naturalWidth || img.clientWidth || 1920;
        itemData.h = img.naturalHeight || img.clientHeight || 1080;
        itemData.msrc = img.src;
      }
      return itemData;
    });

    lightbox.init();
  });

  // Back to top logiikka
  const backToTopBtn = document.getElementById('backToTop');
  const progressBar = document.getElementById('progressBar');
  const circumference = 157;

  window.addEventListener('scroll', () => {
      const scrollTotal = document.documentElement.scrollHeight - window.innerHeight;
      const scrollPosition = window.pageYOffset;
      if (backToTopBtn) {
          // Ei näytetä back-to-top -nappia etusivun sliderissa
          if (document.body.classList.contains('index-page')) {
            backToTopBtn.style.display = 'none';
          } else {
            backToTopBtn.style.display = scrollPosition > 300 ? 'flex' : 'none';
          }
          const scrollPercentage = scrollTotal > 0 ? scrollPosition / scrollTotal : 0;
          const offset = circumference - (scrollPercentage * circumference);
          if (progressBar) progressBar.style.strokeDashoffset = offset;
      }
  });

  if (backToTopBtn) {
      backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  }

  // Staggered Load Animation
  document.addEventListener('DOMContentLoaded', () => {
    // Initialize Intersection Observer for scroll animations
    const observer = new IntersectionObserver((entries) => {
        let delay = 0;
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                setTimeout(() => { entry.target.classList.add('is-visible'); }, delay);
                delay += 150;
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });
    
    // Apply animation only to items below the fold to protect initial LCP paint
    document.querySelectorAll('.image-section, .overview-item').forEach(item => {
        if (item.getBoundingClientRect().top > window.innerHeight) {
            item.classList.add('stagger-item');
            observer.observe(item);
        }
    });
  });

  // Mobile Smart Sticky Header Logic
  const mobileHeader = document.getElementById('mobileHeader');
  if (mobileHeader) {
    let lastScrollTop = 0;
    window.addEventListener('scroll', () => {
      const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      
      if (scrollTop > 0) {
        mobileHeader.classList.add('is-scrolled');
      } else {
        mobileHeader.classList.remove('is-scrolled');
      }
      
      if (scrollTop > lastScrollTop && scrollTop > 50) {
        mobileHeader.classList.add('header--hidden');
      } 
      else if (scrollTop < lastScrollTop) {
        mobileHeader.classList.remove('header--hidden');
      }
      
      lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
    }, { passive: true });
  }
</script>
</body>

</html>
