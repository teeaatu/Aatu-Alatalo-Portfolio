<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V365 - Aatu Alatalo</title>
    <style>
        html { scroll-behavior: smooth }
        body { margin: 0; background-color: #0a0a0a; color: #ffffff; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; display: flex; flex-direction: row; overflow-x: hidden }

        /* --- Loader --- */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease }
        .spinner { width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #ff0000; border-radius: 50%; animation: spin 1s linear infinite }
        @keyframes spin { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }

        /* --- Takaisin ylös -nappi --- */
        .back-to-top { 
            position: fixed; bottom: 40px; right: 40px; display: none; 
            background: #111; color: #ffffff; border: none; 
            width: 55px; height: 55px; border-radius: 50%; 
            font-size: 18px; cursor: pointer; z-index: 1000; 
            transition: all 0.4s ease;
            display: flex; justify-content: center; align-items: center;
        }
        .back-to-top svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); width: 55px; height: 55px }
        .progress-bar { stroke: #ff0000; stroke-dasharray: 157; stroke-dashoffset: 157; transition: stroke-dashoffset 0.1s linear; fill: none; stroke-width: 3; }

        /* --- Sivupalkki (Aside) --- */
        aside { 
            width: 200px; height: 100vh; position: fixed; left: 0; top: 0; 
            padding: 50px 25px; box-sizing: border-box; display: flex; 
            flex-direction: column; justify-content: space-between; 
            border-right: 1px solid #1a1a1a; z-index: 100; background: #0a0a0a;
        }
        .logo { font-size: 18px; text-transform: uppercase; letter-spacing: 3px; text-decoration: none; color: #ffffff; font-weight: 300; line-height: 1.3 }
        nav { display: flex; flex-direction: column; gap: 18px; margin-top: 50px }
        nav a { text-decoration: none; color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.3s ease }
        nav a:hover { color: #ff0000; transform: translateX(6px) }

        /* --- Pääsisältö --- */
        main { margin-left: 200px; width: calc(100% - 200px); min-height: 100vh }
        
        .content-wrapper { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 100px 50px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px 30px;
        }

        .project-header {
            grid-column: span 2;
            text-align: center;
            margin-bottom: 80px;
        }
        .project-header h1 {
            font-size: 42px;
            font-weight: 200;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin: 0 0 40px 0;
            color: #ffffff;
        }

        /* --- Intro Section --- */
        .intro-section { grid-column: span 2; margin-bottom: 120px; border-bottom: 1px solid #1a1a1a; padding-bottom: 80px }
        .intro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 70px }
        .intro-title { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: #ffffff; margin-bottom: 35px; font-weight: 300; text-align: left; }
        .intro-text { font-size: 17px; line-height: 1.7; color: #bbb; font-weight: 300; text-align: left }

        /* --- Kuvat --- */
        .image-section { 
            position: relative; 
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease 
        }
        .image-section.is-visible { opacity: 1; transform: translateY(0) }

        .gallery-img { 
            width: 100%; height: auto; display: block; 
            border-radius: 2px; cursor: zoom-in;
            transition: all 0.5s ease 
        }
        .gallery-img:hover { transform: scale(1.02); box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6) }

        /* --- Lightbox --- */
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; justify-content: center; align-items: center; background: rgba(0,0,0,0.97); cursor: zoom-out }
        .lightbox.active { display: flex }
        .lightbox-img { max-width: 90%; max-height: 85vh; object-fit: contain; cursor: default; }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            pointer-events: none;
        }
        .nav-arrow {
            pointer-events: auto;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 40px;
            cursor: pointer;
            opacity: 0.4;
            transition: all 0.3s ease;
            padding: 20px;
        }
        .nav-arrow:hover { opacity: 1; color: #ff0000; transform: scale(1.1); }

        /* --- Footer --- */
        .contact-section { 
            padding: 250px 50px 100px 50px; 
            background: #000; 
            text-align: left; 
            border-top: 1px solid #141414; 
            grid-column: span 2; 
        }

        /* --- Mobiilisäädöt --- */
        @media (max-width: 1024px) {
            aside { 
                width: 100%; height: auto; position: relative; border-right: none; 
                padding: 40px 20px; display: flex; flex-direction: column; align-items: flex-start; text-align: left;
            }
            nav { flex-direction: row; justify-content: flex-start; flex-wrap: nowrap; margin-top: 25px; gap: 25px; }
            nav a { font-size: 11px; letter-spacing: 1px; }
            .ig-link { position: absolute; top: 40px; right: 40px; margin: 0; }
            main { margin-left: 0; width: 100% }
            body { flex-direction: column }
            .content-wrapper { padding: 40px 20px; grid-template-columns: 1fr; }
            .project-header { grid-column: 1; margin-bottom: 40px; }
            .project-header h1 { font-size: 30px; letter-spacing: 10px; }
            .intro-section { grid-column: 1; margin-bottom: 80px; }
            .intro-grid { grid-template-columns: 1fr; gap: 40px; }
            .contact-section { grid-column: 1; padding: 150px 20px 80px 20px; }
        }
    </style>
</head>
<body>
<div id="loader"><div class="spinner"></div></div>

<button id="backToTop" class="back-to-top" aria-label="Takaisin ylös">
    <svg viewBox="0 0 60 60">
        <circle id="progressBar" class="progress-bar" cx="30" cy="30" r="25"></circle>
    </svg>
    <span>↑</span>
</button>

<aside>
    <div>
        <a href="index.html" class="logo">Aatu<br>Alatalo</a>
        <nav>
            <a href="about.html">About</a>
            <a href="index.html">Series</a>
            <a href="#contact" onclick="document.querySelector('.contact-section').scrollIntoView({behavior: 'smooth'}); return false;">Contact</a>
        </nav>
    </div>
    <a href="https://www.instagram.com/teeaatu/" target="_blank" class="ig-link" style="color:white; opacity:0.7;" aria-label="Instagram">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
    </a>
</aside>

<main>
    <div class="content-wrapper">
        <header class="project-header">
            <h1>V365</h1>
        </header>

        <section class="intro-section">
            <div class="intro-title">V365</div>
            <div class="intro-grid">
                <div class="intro-text" lang="en">
                    The changes of the turn of the year in photographs.
                </div>
                <div class="intro-text" lang="fi">
                    Vuodenvaihdoksen muutokset valokuvina.
                </div>
            </div>
        </section>

        <section class="image-section"><img src="Vuosikuvaus1 1.jpg" alt="V365 valokuva" class="gallery-img" loading="lazy"></section>
        <section class="image-section"><img src="Vuosikuvaus1.jpg" alt="V365 valokuva" class="gallery-img" loading="lazy"></section>
        <section class="image-section"><img src="Vuosikuvaus2.jpg" alt="V365 valokuva" class="gallery-img" loading="lazy"></section>
        <section class="image-section"><img src="Vuosikuvaus3.jpg" alt="V365 valokuva" class="gallery-img" loading="lazy"></section>
        <section class="image-section"><img src="Vuosikuvaus4.jpg" alt="V365 valokuva" class="gallery-img" loading="lazy"></section>
        <section class="image-section"><img src="Vuosikuvaus5.jpg" alt="V365 valokuva" class="gallery-img" loading="lazy"></section>

        <footer class="contact-section" id="contact">
            <div style="font-size: 28px; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 50px; font-weight: 300">Contact</div>
            <div style="font-size: 14px; letter-spacing: 1px; line-height: 2.2; color: #888">
                <p>Aatu Alatalo</p>
                <p><a href="mailto:aatuelias.alatalo@gmail.com" style="color: #ff0000; text-decoration: none;">aatuelias.alatalo@gmail.com</a></p>
                <p>Oulu, Finland</p>
                <p style="margin-top: 50px; font-size: 10px; letter-spacing: 2px; color: #555">COPYRIGHT 2026 AATU ALATALO</p>
            </div>
        </footer>
    </div>
</main>

<div class="lightbox" id="lightbox">
    <div class="lightbox-nav">
        <button class="nav-arrow" id="prevBtn" aria-label="Edellinen">&#10094;</button>
        <button class="nav-arrow" id="nextBtn" aria-label="Seuraava">&#10095;</button>
    </div>
    <img src="" class="lightbox-img" id="lightbox-img">
</div>

<script>
    window.addEventListener('load', () => {
        const loader = document.getElementById('loader');
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none' }, 500);
    });

    const backToTopBtn = document.getElementById('backToTop');
    const progressBar = document.getElementById('progressBar');
    const circumference = 157;

    window.addEventListener('scroll', () => {
        const scrollTotal = document.documentElement.scrollHeight - window.innerHeight;
        const scrollPosition = window.pageYOffset;
        backToTopBtn.style.display = scrollPosition > 300 ? 'flex' : 'none';
        const scrollPercentage = scrollTotal > 0 ? Math.min(scrollPosition / scrollTotal, 1) : 0;
        progressBar.style.strokeDashoffset = circumference - (scrollPercentage * circumference);
    });

    backToTopBtn.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }) });

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if(entry.isIntersecting) {
                entry.target.classList.add('is-visible');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.image-section').forEach(section => observer.observe(section));

    const images = Array.from(document.querySelectorAll(".gallery-img"));
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    let currentIndex = 0;

    function showImage(index) {
        if (index < 0) index = images.length - 1;
        if (index >= images.length) index = 0;
        currentIndex = index;
        lightboxImg.src = images[currentIndex].src;
    }

    images.forEach((img, index) => {
        img.addEventListener("click", () => {
            showImage(index);
            lightbox.classList.add("active");
            document.body.style.overflow = "hidden";
        });
    });

    lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox || e.target === lightboxImg) {
            lightbox.classList.remove("active");
            document.body.style.overflow = "auto";
        }
    });

    prevBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        showImage(currentIndex - 1);
    });

    nextBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        showImage(currentIndex + 1);
    });

    document.addEventListener("keydown", (e) => {
        if (!lightbox.classList.contains("active")) return;
        if (e.key === "ArrowLeft") showImage(currentIndex - 1);
        if (e.key === "ArrowRight") showImage(currentIndex + 1);
        if (e.key === "Escape") {
            lightbox.classList.remove("active");
            document.body.style.overflow = "auto";
        }
    });
</script>
</body>
</html>
